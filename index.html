            {

                q_si: "දත්ත සන්නිවේදන පද්ධතියක (Data Communication System) ප්‍රධාන සංරචක (Components) කීයක් තිබේද?",

            },
            {

                q_si: "පහත ඒවායින් Data Communication System එකක අංගයක් නොවන්නේ කුමක්ද?", 
                q_en: "Which of the following is NOT a component of a Data Communication System?",
                o_si: ["Sender", "Protocol", "Router", "Transmission Medium"], o_en: ["Sender", "Protocol", "Router", "Transmission Medium"], a: 2 
            },
            { l: 'L1', q_si: "එක් දිශාවකට පමණක් දත්ත ගලායන (Data flow) ක්‍රමය කුමක්ද?", q_en: "What is the data flow mode where data flows in only one direction?", o_si: ["Half-duplex", "Full-duplex", "Simplex", "Multiplex"], o_en: ["Half-duplex", "Full-duplex", "Simplex", "Multiplex"], a: 2 },
            { l: 'L1', q_si: "Walkie-talkie යන්ත්‍රයක භාවිතා වන දත්ත ගලායාමේ ක්‍රමය කුමක්ද?", q_en: "Which data flow mode is used in a Walkie-talkie?", o_si: ["Simplex", "Half-duplex", "Full-duplex", "Complex"], o_en: ["Simplex", "Half-duplex", "Full-duplex", "Complex"], a: 1 },
            { l: 'L1', q_si: "දුරකථන ජාලයක (Telephone network) දත්ත ගමන් කරන්නේ කුමන ආකාරයටද?", q_en: "In what mode does data travel in a Telephone network?", o_si: ["Simplex", "Half-duplex", "Full-duplex", "Auto-duplex"], o_en: ["Simplex", "Half-duplex", "Full-duplex", "Auto-duplex"], a: 2 },
            { l: 'L1', q_si: "පහත සඳහන් Physical Topologies අතරින්, මධ්‍යම උපාංගයක් (Hub/Switch) හරහා සියලුම උපාංග සම්බන්ධ වන Topology එක කුමක්ද?", q_en: "Among the following Physical Topologies, which one connects all devices through a central device (Hub/Switch)?", o_si: ["Bus Topology", "Star Topology", "Ring Topology", "Mesh Topology"], o_en: ["Bus Topology", "Star Topology", "Ring Topology", "Mesh Topology"], a: 1 },
            { l: 'L1', q_si: "Mesh Topology එකක උපාංග (Nodes) n ප්‍රමාණයක් ඇත්නම්, අවශ්‍ය වන physical links ප්‍රමාණය සෙවීමේ සූත්‍රය කුමක්ද?", q_en: "If a Mesh Topology has 'n' nodes, what is the formula to find the number of physical links required?", o_si: ["n(n-1) / 2", "n / 2", "n(n+1) / 2", "n^2"], o_en: ["n(n-1) / 2", "n / 2", "n(n+1) / 2", "n^2"], a: 0 },
            { l: 'L1', q_si: "LAN යන්නෙහි දිගු නාමය කුමක්ද?", q_en: "What does LAN stand for?", o_si: ["Local Area Network", "Large Area Network", "Logical Area Network", "Linked Area Network"], o_en: ["Local Area Network", "Large Area Network", "Logical Area Network", "Linked Area Network"], a: 0 },
            { l: 'L1', q_si: "රටක් හෝ මහද්වීපයක් පුරා විහිදී ඇති ජාලයක් හඳුන්වන්නේ කෙසේද?", q_en: "How is a network that spans across a country or continent called?", o_si: ["LAN", "MAN", "WAN", "PAN"], o_en: ["LAN", "MAN", "WAN", "PAN"], a: 2 },
            { l: 'L1', q_si: "Circuit Switching හි ප්‍රධාන ලක්ෂණයක් වන්නේ කුමක්ද?", q_en: "What is a main characteristic of Circuit Switching?", o_si: ["පණිවිඩය කුඩා කොටස් වලට කඩා යැවීම (Breaking messages into packets)", "කල්තියා මාර්ගයක් වෙන් කර තබා ගැනීම (Dedicated path reservation)", "Router වල Queue වීම (Queueing in Routers)", "වෙනස් මාර්ග හරහා දත්ත ගමන් කිරීම (Data traveling through different paths)"], o_en: ["Breaking messages into small packets", "Reserving a dedicated path in advance", "Queueing in routers", "Data traveling through different paths"], a: 1 },
            { l: 'L1', q_si: "Packet Switching වලදී, Router එකක් තුළ පැකට්ටුවක් පිටවීමට පෙර රැඳී සිටින කාලය හඳුන්වන්නේ කුමක් ලෙසද?", q_en: "In Packet Switching, the time a packet waits in a router before being transmitted is called?", o_si: ["Transmission delay", "Propagation delay", "Queueing delay", "Processing delay"], o_en: ["Transmission delay", "Propagation delay", "Queueing delay", "Processing delay"], a: 2 },
            { l: 'L1', q_si: "[අමාරුයි] පැකට්ටුවක සියලුම බිට් (bits) ටික සම්ප්‍රේෂණ මාධ්‍යයට (link එකට) මුදා හැරීමට ගතවන කාලය කුමක්ද?", q_en: "[Hard] The time required to push all bits of a packet onto the transmission link is called?", o_si: ["Propagation delay", "Transmission delay", "Processing delay", "End-to-end delay"], o_en: ["Propagation delay", "Transmission delay", "Processing delay", "End-to-end delay"], a: 1 },
            { l: 'L1', q_si: "[අමාරුයි] L දිගින් යුතු පැකට්ටුවක්, R වේගයක් (bps) ඇති මාර්ගයක යැවීමේදී Transmission Delay එක ගණනය කරන්නේ කෙසේද?", q_en: "[Hard] How do you calculate the Transmission Delay of a packet of length L over a link with transmission rate R (bps)?", o_si: ["L * R", "R / L", "L / R", "L + R"], o_en: ["L * R", "R / L", "L / R", "L + R"], a: 2 },
            { l: 'L1', q_si: "සම්ප්‍රේෂණ මාධ්‍යය දිගේ බිට් එකක් ගමන් කිරීමට ගතවන කාලය (distance / speed) කුමක්ද?", q_en: "The time it takes for a bit to travel along the transmission medium (distance / speed) is?", o_si: ["Processing Delay", "Transmission Delay", "Queueing Delay", "Propagation Delay"], o_en: ["Processing Delay", "Transmission Delay", "Queueing Delay", "Propagation Delay"], a: 3 },
            { l: 'L1', q_si: "පැකට්ටුවක හෙඩරය (Header) පරීක්ෂා කර බලා එය යැවිය යුතු දිශාව තීරණය කිරීමට Router එකක් ගන්නා කාලය කුමක්ද?", q_en: "The time a router takes to examine a packet's header and determine where to direct it is?", o_si: ["Processing Delay", "Transmission Delay", "Propagation Delay", "Nodal Delay"], o_en: ["Processing Delay", "Transmission Delay", "Propagation Delay", "Nodal Delay"], a: 0 },
            { l: 'L1', q_si: "Router එකක Buffer (Queue) එක සම්පූර්ණයෙන්ම පිරී ඇති විට අලුතින් පැමිණෙන පැකට්ටුවකට කුමක් සිදුවේද?", q_en: "What happens to a newly arriving packet when a router's buffer (queue) is completely full?", o_si: ["එය නැවත හරවා යවයි (Sent back)", "එය ඉවත දමයි (Packet Loss / Dropped)", "එය විශේෂ මාර්ගයකින් යවයි (Sent via special route)", "එය අනිවාර්යයෙන්ම ගබඩා කරගනී (Stored forcibly)"], o_en: ["It is sent back", "It is dropped (Packet Loss)", "It is sent via a special route", "It is forcibly stored"], a: 1 },
            { l: 'L1', q_si: "තත්පරයකදී යවන්නාගේ සිට ලබන්නා වෙත සාර්ථකව ගමන් කරන බිට් ප්‍රමාණය (bits/sec) හඳුන්වන්නේ කුමක් ලෙසද?", q_en: "The rate at which bits are successfully transferred from sender to receiver (bits/sec) is called?", o_si: ["Bandwidth", "Delay", "Throughput", "Latency"], o_en: ["Bandwidth", "Delay", "Throughput", "Latency"], a: 2 },
            { l: 'L1', q_si: "Bottleneck link එකක් යනු කුමක්ද?", q_en: "What is a Bottleneck link?", o_si: ["ජාලයේ වැඩිම වේගයක් ඇති link එක (Fastest link)", "ජාලයේ End-to-end throughput එක සීමා කරන අඩුම වේගයක් ඇති link එක (Slowest link that constrains throughput)", "Router දෙකක් අතර ඇති කෙටිම මාර්ගය (Shortest path)", "දෝෂ සහිත link එකක් (Faulty link)"], o_en: ["The link with the highest speed in the network", "The link with the lowest speed that constrains the end-to-end throughput", "The shortest path between two routers", "A faulty link in the network"], a: 1 },
            { l: 'L1', q_si: "අන්තර්ජාලය (Internet) යනු කුමක්ද?", q_en: "What is the Internet?", o_si: ["තනි විශාල පරිගණකයක් (One large computer)", "ලොව පුරා ඇති ජාලයන්ගේ ජාලයක් (Network of networks)", "එක් රටකට පමණක් සීමා වූ ජාලයක් (Network limited to one country)", "මෘදුකාංග පද්ධතියක් (A software system)"], o_en: ["A single large computer", "A global network of networks", "A network limited to a single country", "A software system"], a: 1 },
            { l: 'L1', q_si: "වර්තමාන අන්තර්ජාලය තුළ වැඩිපුරම භාවිතා වන Switching ක්‍රමය කුමක්ද?", q_en: "What is the most widely used switching method in today's Internet?", o_si: ["Circuit Switching", "Packet Switching", "Message Switching", "Line Switching"], o_en: ["Circuit Switching", "Packet Switching", "Message Switching", "Line Switching"], a: 1 },

            // --- Lecture 2: Protocol Architecture (20 Questions) ---

            { l: 'L4', q_si: "[අමාරුයි] CSMA/CD ක්‍රමයේදී ගැටීමක් (Collision) හඳුනාගත් පසු උපාංග කරන්නේ කුමක්ද?", q_en: "[Hard] In CSMA/CD, what do devices do after detecting a collision?", o_si: ["වහාම නැවත දත්ත යවයි", "Jam signal එකක් යවා අහඹු කාලයක් (Random backoff time) බලා සිටී", "Router එකට දැනුම් දෙයි", "පරිගණකය Restart වෙයි"], o_en: ["Immediately retransmit the data", "Send a Jam signal and wait for a random backoff time", "Inform the Router", "The computer restarts"], a: 1 },
            { l: 'L4', q_si: "Switch එකකට Destination MAC address එක තමන්ගේ MAC Table එකේ නොමැති Frame එකක් ලැබුණු විට එය කරන්නේ කුමක්ද?", q_en: "What does a Switch do when it receives a frame whose Destination MAC Address is not in its MAC Table?", o_si: ["Frame එක Drop කරයි", "Frame එක පැමිණි Port එක හැර අනෙකුත් සියලුම Port වලින් පිට කරයි (Flooding)", "Source එකට ආපසු යවයි", "Error පණිවිඩයක් යවයි"], o_en: ["Drops the frame", "Forwards the frame out of all ports except the one it arrived on (Flooding)", "Sends it back to the source", "Sends an error message"], a: 1 },

            { l: 'Lab', q_si: "Packet Tracer හි Switch එකක් ක්‍රියා කරන ආකාරය Hub එකකට වඩා වෙනස් වන්නේ කෙසේද?", q_en: "How is a Switch different from a Hub in Packet Tracer?", o_si: ["එය වේගයෙන් ක්‍රියා නොකරයි", "අදාළ ගමනාන්තයට (Destination) පමණක් පැකට්ටුව යවයි", "සියලුම port වලට පැකට් යවයි", "MAC ලිපින භාවිතා නොකරයි"], o_en: ["It does not work fast", "Sends the packet only to the intended destination", "Sends packets to all ports", "Does not use MAC addresses"], a: 1 },

            { l: 'Lab', q_si: "Ping විධානය (command) මඟින් මූලිකවම භාවිතා කරන ප්‍රොටෝකෝලය කුමක්ද?", q_en: "Which protocol is primarily used by the Ping command?", o_si: ["TCP", "UDP", "ICMP", "HTTP"], o_en: ["TCP", "UDP", "ICMP", "HTTP"], a: 2 },

            { l: 'Lab', q_si: "Wireshark මෘදුකාංගයේ ප්‍රධාන කාර්යය කුමක්ද?", q_en: "What is the main function of Wireshark?", o_si: ["වයිරස් ඉවත් කිරීම", "ජාලය හරහා ගමන් කරන පැකට් ග්‍රහණය කර විශ්ලේෂණය කිරීම (Packet analysis)", "IP ලිපින සැකසීම", "Wi-Fi වේගය වැඩි කිරීම"], o_en: ["Removing viruses", "Capturing and analyzing network packets (Packet analysis)", "Configuring IP addresses", "Increasing Wi-Fi speed"], a: 1 },

            { l: 'Lab', q_si: "Switch එකක MAC address table එක හිස්ව ඇති විටක, අලුතින් frame එකක් පැමිණියහොත් කුමක් සිදුවේද?", q_en: "What happens when a new frame arrives at a Switch and its MAC address table is empty?", o_si: ["Frame එක මකා දමයි", "එය පැමිණි port එක හැර අනෙකුත් සියලුම port වලින් පිට කරයි (Flooding)", "එය Router එකට යවයි", "MAC ලිපිනය අන්තර්ජාලයෙන් සොයයි"], o_en: ["Drops the frame", "Forwards out of all ports except the incoming port (Flooding)", "Sends it to the Router", "Searches the MAC address on the internet"], a: 1 },

            { l: 'Lab', q_si: "Router එකක sub-interface එකකට IP address එකක් ලබා දීමට පෙර අනිවාර්යයෙන්ම කළ යුත්තේ කුමක්ද?", q_en: "What must be done before assigning an IP address to a router's sub-interface?", o_si: ["no shutdown විධානය දීම", "encapsulation dot1Q විධානය ලබා දීම", "Router එක Restart කිරීම", "Switch එකට Ping කිරීම"], o_en: ["Issue no shutdown command", "Issue encapsulation dot1Q command", "Restart the router", "Ping the switch"], a: 1 },
            { l: 'Lab', q_si: "Switch එකක ඇති port එකක් යම් VLAN එකකට (උදා: VLAN 50) ඇතුළත් කිරීමට භාවිතා කරන විධානය (command) කුමක්ද?", q_en: "Which command is used to assign a switch port to a specific VLAN (e.g., VLAN 50)?", o_si: ["switchport access vlan 50", "vlan 50 enable", "ip address vlan 50", "assign port vlan 50"], o_en: ["switchport access vlan 50", "vlan 50 enable", "ip address vlan 50", "assign port vlan 50"], a: 0 },
            { l: 'Lab', q_si: "Router එකේ ප්‍රධාන (main) interface එක (උදා: Fa0/0) ක්‍රියාත්මක (on) කිරීමට භාවිතා කරන විධානය කුමක්ද?", q_en: "Which command is used to turn on the main interface of a Router (e.g., Fa0/0)?", o_si: ["start interface", "enable interface", "no shutdown", "interface up"], o_en: ["start interface", "enable interface", "no shutdown", "interface up"], a: 2 },
            { l: 'Lab', q_si: "VLAN ID 100 සඳහා sub-interface එකක් නිර්මාණය කරන නිවැරදි විධානය කුමක්ද? (FastEthernet 0/0 භාවිතා කරමින්)", q_en: "What is the correct command to create a sub-interface for VLAN ID 100? (Using FastEthernet 0/0)", o_si: ["interface vlan 100", "interface FastEthernet 0/0.100", "interface FastEthernet 100/0", "vlan 100 sub-interface"], o_en: ["interface vlan 100", "interface FastEthernet 0/0.100", "interface FastEthernet 100/0", "vlan 100 sub-interface"], a: 1 },
            { l: 'Lab', q_si: "Ping විධානය ක්‍රියාත්මක කිරීමට පෙර, අදාළ ගමනාන්තයේ MAC address එක සොයාගැනීමට යවන Packet එක කුමක්ද?", q_en: "Before executing a Ping command, which packet is sent to find the MAC address of the destination?", o_si: ["DNS Query", "ICMP Echo", "ARP Request", "TCP SYN"], o_en: ["DNS Query", "ICMP Echo", "ARP Request", "TCP SYN"], a: 2 },
            { l: 'Lab', q_si: "පරිගණකයක (PC) ඇති ARP Cache එක (Table එක) මකා දැමීමට භාවිතා කරන විධානය කුමක්ද?", q_en: "Which command is used to clear the ARP Cache (Table) on a PC?", o_si: ["arp -clear", "arp -delete", "arp -d", "arp -x"], o_en: ["arp -clear", "arp -delete", "arp -d", "arp -x"], a: 2 },
            { l: 'Lab', q_si: "දැනට පරිගණකයේ ගබඩා වී ඇති ARP table එක බැලීමට භාවිතා කරන විධානය කුමක්ද?", q_en: "Which command is used to view the currently stored ARP table on a PC?", o_si: ["arp -show", "arp -a", "show arp", "display arp"], o_en: ["arp -show", "arp -a", "show arp", "display arp"], a: 1 },
            { l: 'Lab', q_si: "Router එකකට අනවසරයෙන් ඇතුළුවීම වැළැක්වීමට ලබා දෙන මුරපද (Passwords) ප්‍රධාන වර්ග 2 කුමක්ද?", q_en: "What are the 2 main types of passwords used to prevent unauthorized access to a Router?", o_si: ["Admin සහ Guest", "User level සහ Privilege level", "Local සහ Cloud", "System සහ Application"], o_en: ["Admin and Guest", "User level and Privilege level", "Local and Cloud", "System and Application"], a: 1 },
            { l: 'Lab', q_si: "\"Buffer Filtered Events Only\" යන විකල්පය (Option) Packet Tracer හි භාවිතා කරන්නේ ඇයි?", q_en: "Why is the \"Buffer Filtered Events Only\" option used in Packet Tracer?", o_si: ["අවශ්‍ය සිදුවීම් (Events) පමණක් ගබඩා කර Memory පිරීයාම වැළැක්වීමට", "පැකට් වේගවත් කිරීමට", "දෝෂ ඇති පැකට් මකා දැමීමට", "වයිරස් වලින් ආරක්ෂා වීමට"], o_en: ["To store only required events and prevent memory overflow", "To speed up packets", "To delete error packets", "To protect against viruses"], a: 0 },
            { l: 'Lab', q_si: "Private IP ලිපිනයක් (උදා: 192.168.1.10) භාවිතා කිරීමේ ලක්ෂණයක් කුමක්ද?", q_en: "What is a characteristic of using a Private IP address (e.g., 192.168.1.10)?", o_si: ["එය ලෝකයේ වෙනත් කිසිම පරිගණකයක භාවිතා කළ නොහැක", "එය අන්තර්ජාලය තුළ (Public Internet) සෘජුවම භාවිතා කළ නොහැක", "එය ගෙවීමක් කර ලබාගත යුතුය", "එය Router වලට පමණක් ලබා දේ"], o_en: ["It cannot be used by any other computer in the world", "It cannot be used directly on the Public Internet", "It must be purchased", "It is only given to Routers"], a: 1 },
            { l: 'Lab', q_si: "Packet Tracer හි රවුටරයක (Router) Command Line Interface (CLI) එකට පිවිසීමේදී මුලින්ම විමසන User Level මුරපදය සකසන්නේ කෙසේද?", q_en: "How do you set the User Level password that is asked first when accessing a Router's CLI in Packet Tracer?", o_si: ["enable secret password මගින්", "Line console 0 හරහා password එකක් ලබාදීමෙන්", "vty lines හරහා password ලබාදීමෙන්", "Router හි භෞතික (Physical) බොත්තමක් එබීමෙන්"], o_en: ["Using 'enable secret password'", "By setting a password via 'line console 0'", "By setting passwords via 'vty lines'", "By pressing a physical button on the router"], a: 1 }
        ];

        // App State
        let currentLang = 'en';
        let answeredQuestions = new Array(mcqData.length).fill(false);
        let selectedAnswers = new Array(mcqData.length).fill(null);

        function initQuiz() {
            const container = document.getElementById('quiz-container');
            let currentLecture = '';
            let htmlContent = '';

            mcqData.forEach((item, index) => {
                // Add lecture headers
                if (item.l !== currentLecture) {
                    currentLecture = item.l;
                    htmlContent += `
                        <div id="lecture-${item.l}" class="lecture-section my-8 border-b-4 border-blue-500 pb-2">
                            <h2 class="text-2xl font-bold text-blue-800 dark:text-blue-400" id="lecture-title-${item.l}">
                                ${item[`lname_${currentLang}`]}
                            </h2>
                        </div>
                    `;
                }

                // Build question card
                let optionsHtml = '';
                item[`o_${currentLang}`].forEach((opt, optIndex) => {
                    optionsHtml += `
                        <label id="lbl-${index}-${optIndex}" class="opt-label block p-3 mb-2 rounded border border-gray-300 dark:border-gray-600 transition-colors cursor-pointer">
                            <input type="radio" name="q${index}" value="${optIndex}" class="mr-2 h-4 w-4 text-blue-600 focus:ring-blue-500" onchange="enableCheckBtn(${index})">
                            <span class="text-lg" id="opt-text-${index}-${optIndex}">${opt}</span>
                        </label>
                    `;
                });

                htmlContent += `
                    <div class="bg-white dark:bg-darkcard p-6 rounded-lg shadow-md mb-6 border dark:border-gray-700 transition-colors" id="q-card-${index}">
                        <h3 class="text-lg font-semibold mb-4 text-gray-800 dark:text-gray-200">
                            <span class="text-blue-600 dark:text-blue-400 mr-2">${index + 1}.</span>
                            <span id="q-text-${index}">${item[`q_${currentLang}`]}</span>
                        </h3>
                        <div class="options-group mb-4">
                            ${optionsHtml}
                        </div>
                        <button id="check-btn-${index}" disabled class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded opacity-50 cursor-not-allowed transition-all" onclick="checkAnswer(${index})">
                            ${uiText[currentLang].checkBtn}
                        </button>
                        <div id="feedback-${index}" class="mt-4 p-3 rounded hidden font-medium transition-colors"></div>
                    </div>
                `;
            });

            container.innerHTML = htmlContent;
        }

        // Functions for Toggle
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            const icon = document.getElementById('darkModeIcon');
            if(isDark) {
                icon.className = 'fas fa-sun';
            } else {
                icon.className = 'fas fa-moon';
            }
        }

        function toggleLanguage() {
            // Switch Language State
            currentLang = currentLang === 'si' ? 'en' : 'si';
            
            // Update Toggle Button Text
            document.getElementById('langToggleBtn').innerText = currentLang === 'si' ? 'EN' : 'සිංහල';
            
            // Update general UI text
            document.getElementById('main-title').innerText = uiText[currentLang].title;
            document.getElementById('opt-select-lec').innerText = uiText[currentLang].selectLec;

            // Update Lab option in dropdown
            const optLab = document.getElementById('opt-lab');
            if(optLab) {
                optLab.innerText = currentLang === 'si' ? 'ලැබ් ප්‍රායෝගික (Lab Practicals)' : 'Lab Practicals';
            }

            // Update DOM element by element to preserve 'checked' state and visual feedback
            mcqData.forEach((item, index) => {
                // Update Question Text
                document.getElementById(`q-text-${index}`).innerText = item[`q_${currentLang}`];
                
                // Update Options
                item[`o_${currentLang}`].forEach((opt, optIndex) => {
                    document.getElementById(`opt-text-${index}-${optIndex}`).innerText = opt;
                });

                // Update Button
                const btn = document.getElementById(`check-btn-${index}`);
                if (btn) {
                    btn.innerText = uiText[currentLang].checkBtn;
                }

                // If this question is already answered, update its feedback text
                if (answeredQuestions[index]) {
                    renderFeedbackUI(index);
                }
            });

            // Update Lecture Headers safely
            const uniqueLectures = [...new Set(mcqData.map(item => item.l))];
            uniqueLectures.forEach(l => {
                const lectureItem = mcqData.find(item => item.l === l);
                const header = document.getElementById(`lecture-title-${l}`);
                if (header) {
                    header.innerText = lectureItem[`lname_${currentLang}`];
                }
            });
        }

        // Quiz Logic Methods
        function enableCheckBtn(qIndex) {
            const btn = document.getElementById(`check-btn-${qIndex}`);
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function checkAnswer(qIndex) {
            const selectedOption = document.querySelector(`input[name="q${qIndex}"]:checked`);
            if (!selectedOption) return;

            const selectedValue = parseInt(selectedOption.value);
            selectedAnswers[qIndex] = selectedValue;
            answeredQuestions[qIndex] = true;

            const qCard = document.getElementById(`q-card-${qIndex}`);
            const radios = qCard.querySelectorAll(`input[name="q${qIndex}"]`);

            // Disable radios
            radios.forEach(radio => {
                radio.disabled = true;
                const label = document.getElementById(`lbl-${qIndex}-${radio.value}`);
                label.classList.add('disabled');
            });

            // Hide button
            document.getElementById(`check-btn-${qIndex}`).style.display = 'none';

            // Render Feedback
            renderFeedbackUI(qIndex);
        }

        function renderFeedbackUI(qIndex) {
            const selectedValue = selectedAnswers[qIndex];
            const correctValue = mcqData[qIndex].a;
            const feedbackDiv = document.getElementById(`feedback-${qIndex}`);
            const labels = [];
            
            // Gather labels
            for(let i=0; i<mcqData[qIndex].o_si.length; i++) {
                labels.push(document.getElementById(`lbl-${qIndex}-${i}`));
            }

            if (selectedValue === correctValue) {
                // Correct UI
                labels[selectedValue].classList.add('correct-bg');
                feedbackDiv.innerHTML = `<i class="fas fa-check-circle text-green-600 dark:text-green-400 mr-2 text-xl"></i> <span class="text-green-800 dark:text-green-400">${uiText[currentLang].correctStatus}</span>`;
                feedbackDiv.className = `mt-4 p-3 rounded font-medium bg-green-100 dark:bg-green-900 border border-green-400 dark:border-green-600`;
            } else {
                // Wrong UI
                labels[selectedValue].classList.add('wrong-bg');
                labels[correctValue].classList.add('correct-bg', 'border-green-500', 'border-2');
                
                feedbackDiv.innerHTML = `
                    <i class="fas fa-times-circle text-red-600 dark:text-red-400 mr-2 text-xl"></i> <span class="text-red-800 dark:text-red-400 mb-1 block">${uiText[currentLang].wrongStatus}</span>
                    <span class="text-green-700 dark:text-green-400 text-sm mt-1 block border-t border-green-200 dark:border-green-700 pt-2"><i class="fas fa-arrow-right mr-1"></i> ${uiText[currentLang].correctAnsPrefix} <b>${mcqData[qIndex][`o_${currentLang}`][correctValue]}</b></span>
                `;
                feedbackDiv.className = `mt-4 p-3 rounded font-medium bg-red-50 dark:bg-red-900 border border-red-400 dark:border-red-600`;
            }

            feedbackDiv.classList.remove('hidden');
        }

        function scrollToLecture() {
            const select = document.getElementById('lectureSelect');
            const targetId = select.value;
            if (targetId) {
                const targetElement = document.getElementById(`lecture-${targetId}`);
                if (targetElement) {
                    targetElement.scrollIntoView({ behavior: 'smooth' });
                }
            }
            setTimeout(() => { select.value = ""; }, 1000); 
        }

        // Check system preference for dark mode initially
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            toggleDarkMode(); // Set to dark mode if system prefers it
        }

        // Initialize App
        window.onload = initQuiz;
    </script>
</body>
</html>
